<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>60x120 Tiles | LuxeCeram</title>
<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<header class="header">
  <div class="container nav">
    <a class="logo" href="index.html">
      <img src="assets/logo.svg" alt="LuxeCeram">
    </a>
    <nav class="menu">
      <a href="index.html">Home</a>
      <a href="index.html#sizes">Sizes</a>
      <a href="index.html#contact">Contact</a>
    </nav>
  </div>
</header>

<section class="product-hero">
  <div class="container">
    <div class="kicker">Product Collection</div>
    <h1 class="section-title">60×120 cm Tiles</h1>
    <p style="color:#ddd;line-height:1.8;max-width:760px">
      Premium export quality ceramic and porcelain tiles.
    </p>
  </div>
</section>

<section class="section">
  <div class="container">
    <h2 class="section-title">Sample Gallery</h2>
    <div id="gallery" class="gallery"></div>
  </div>
</section>

<a class="whatsapp" href="https://wa.me/989131573161">WhatsApp</a>

<footer class="footer">
  <div class="container">© 2026 LuxeCeram</div>
</footer>

<script>
const tileSize = "60x120";
const imageCount = 50;

const gallery = document.getElementById("gallery");

for (let i = 1; i <= imageCount; i++) {
  const number = String(i).padStart(2, "0");
  const imgPath = `assets/${tileSize}/${number}.jpg`;

  const card = document.createElement("div");
  card.className = "product-card";

  card.innerHTML = `
    <img src="${imgPath}" alt="${tileSize} tile ${number}" loading="lazy">
    <div>
      <h3>${tileSize} Model ${number}</h3>
      <a class="btn" href="https://wa.me/989131573161?text=Hello%20LuxeCeram,%20I%20am%20interested%20in%20${tileSize}%20Model%20${number}">
        Ask Price
      </a>
    </div>
  `;

  gallery.appendChild(card);
}
</script>

</body>
</html>
