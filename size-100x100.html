<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LuxeCeram Collection</title>
<link rel="stylesheet" href="assets/style.css">
</head>

<body>

<header class="header">
<div class="container nav">
<a class="logo" href="index.html">
<img src="assets/logo.svg" alt="LuxeCeram">
</a>

<nav class="menu">
<a href="index.html">Home</a>
<a href="index.html#sizes">Sizes</a>
<a href="index.html#contact">Contact</a>
</nav>
</div>
</header>

<section class="section">
<div class="container">

<h1 class="section-title" id="pageTitle"></h1>

<div id="gallery" class="gallery"></div>

</div>
</section>

<script>

const tileSize = "100x100";
const imageCount = 100;

document.getElementById("pageTitle").innerText =
tileSize + " cm Collection";

const gallery = document.getElementById("gallery");

for(let i=1;i<=imageCount;i++){

const number = String(i).padStart(2,"0");

const card = document.createElement("div");

card.className="product-card";

card.innerHTML=`

<img src="assets/${tileSize}/${number}.jpg"
onerror="this.parentElement.style.display='none'">

<div>
<h3>${tileSize} - ${number}</h3>

<a class="btn"
href="https://wa.me/989131573161?text=I am interested in ${tileSize} model ${number}">
Ask Price
</a>

</div>

`;

gallery.appendChild(card);

}

</script>

</body>
</html>
